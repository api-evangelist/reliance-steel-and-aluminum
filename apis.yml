solutions:
  - name: Metals Distribution
    description: >-
      Full-line metals distribution across aluminum, steel, stainless, copper,
      titanium, and specialty alloys serving 130,000+ customers globally.
  - name: Value-Added Processing
    description: >-
      On-site metals processing services including cutting, sawing, shearing,
      blanking, stamping, leveling, and custom fabrication to customer spec.
  - name: Supply Chain Management
    description: >-
      Just-in-time delivery, inventory management, and supply chain
      optimization services for manufacturing and industrial customers.
  - name: EDI Integration
    description: >-
      Electronic data interchange integration for procurement, order management,
      and invoicing workflows with major ERP and procurement systems.
useCases:
  - name: Aerospace Materials Supply
    description: >-
      Supply certified aerospace-grade aluminum, titanium, and specialty alloys
      to aircraft manufacturers and defense contractors.
  - name: Automotive Steel Supply
    description: >-
      Deliver carbon and alloy steel to automotive OEMs and tier-1 suppliers
      with just-in-time inventory management.
  - name: Energy Sector Metals
    description: >-
      Provide corrosion-resistant stainless steel and specialty alloys for
      oil and gas, renewable energy, and power generation projects.
  - name: Semiconductor Manufacturing
    description: >-
      Supply high-purity aluminum, copper, and specialty metals for
      semiconductor fabrication and electronics manufacturing.
integrations:
  - name: SAP Integration
    description: EDI and API integration with SAP ERP procurement workflows
  - name: Oracle Integration
    description: EDI connectivity for Oracle ERP purchase order automation
  - name: Cleo Integration
    description: EDI trading partner integration via Cleo platform
