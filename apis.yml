aid: reliance-steel-and-aluminum
name: Reliance Steel & Aluminum
description: >-
  Reliance Steel & Aluminum Co. is the largest metals service center in North
  America, providing value-added metals processing services and distributing a
  full line of metal products including aluminum, brass, bronze, carbon and
  alloy steel, copper, titanium, and stainless steel. Operating over 300
  service center locations across 40 US states and 13 countries, Reliance serves
  more than 130,000 customers across aerospace, automotive, defense, energy,
  electronics, construction, and semiconductor end markets.
